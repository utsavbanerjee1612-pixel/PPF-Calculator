name: Build Debug APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate and Download Gradle Wrapper
        run: gradle wrapper

      - name: Setup Static Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=/home/runner/.android/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PPF-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
